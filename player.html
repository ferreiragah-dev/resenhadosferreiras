<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Resenha do Futebol - Jogador</title>
<link rel="stylesheet" href="player.css">
</head>
<body>
<div class="app">
  <section id="authScreen">
    <div id="playerLoginView" class="auth-view">
      <div class="auth">
        <div class="logo">⚽ Resenha FC</div>

        <form id="loginForm" class="auth-form">
          <div class="input-group">
            <label>Email</label>
            <input id="loginEmail" type="email" placeholder="seu@email.com" autocomplete="email" required />
          </div>

          <div class="input-group">
            <label>Senha</label>
            <input id="loginPassword" type="password" placeholder="••••••••" autocomplete="current-password" required />
          </div>

          <button type="submit">Entrar</button>
        </form>

        <div class="link">
          Nao tem conta? <a href="#" id="goToRegisterLink">Criar conta</a>
        </div>
      </div>
    </div>

    <div id="playerRegisterView" class="auth-view" hidden>
      <div class="auth">
        <div class="logo">⚽ Criar Conta</div>

        <form id="registerForm" class="auth-form">
          <div class="input-group">
            <label>Nome</label>
            <input id="registerName" type="text" placeholder="Seu nome" autocomplete="name" required />
          </div>

          <div class="input-group">
            <label>Email</label>
            <input id="registerEmail" type="email" placeholder="seu@email.com" autocomplete="email" required />
          </div>

          <div class="input-group">
            <label>Senha</label>
            <input id="registerPassword" type="password" placeholder="Crie uma senha" autocomplete="new-password" minlength="4" required />
          </div>

          <div class="input-group">
            <label>Seu time</label>
            <select id="registerTeamSelect">
              <option value="">Selecione</option>
            </select>
          </div>

          <button type="submit">Cadastrar</button>
        </form>

        <div class="link">
          Ja tem conta? <a href="#" id="goToLoginLink">Entrar</a>
        </div>
      </div>
    </div>

    <p id="authMessage" class="auth-message"></p>
  </section>

  <section id="homeScreen" hidden>
    <div id="linkPendingBox" class="pending-box" hidden>
      <strong>Aguardando vinculo no PWA</strong>
      <p id="linkPendingText"></p>
    </div>

    <div class="main-profile">
      <img id="mainAvatar" class="avatar" alt="Foto do jogador">
      <div id="mainName" class="name">Jogador</div>
      <div id="mainTeam" class="team">Sem time</div>

      <div id="mainStats" class="stats"></div>
    </div>

    <div class="team-list">
      <div class="section-row">
        <div class="section-title">Companheiros de Time</div>
        <div class="section-actions">
          <button id="refreshHomeBtn" class="ghost-btn" type="button">Atualizar</button>
          <button id="logoutBtn" class="ghost-btn" type="button">Sair</button>
        </div>
      </div>

      <div id="teammatesList"></div>
    </div>
  </section>
</div>

<script src="player.js" defer></script>
</body>
</html>
