<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#12304a">
  <title>Resenha dos Ferreira - Jogador</title>
  <link rel="stylesheet" href="player.css">
</head>
<body>
  <main class="player-shell">
    <section id="authScreen" class="screen card">
      <div class="brand">
        <p>Resenha dos Ferreira</p>
        <h1>Área do Jogador</h1>
      </div>

      <div class="auth-tabs" role="tablist" aria-label="Autenticação">
        <button class="auth-tab is-active" data-auth-tab="login" type="button">Entrar</button>
        <button class="auth-tab" data-auth-tab="register" type="button">Cadastrar</button>
      </div>

      <form id="loginForm" class="auth-form" data-panel="login">
        <label>Email<input id="loginEmail" type="email" autocomplete="email" required></label>
        <label>Senha<input id="loginPassword" type="password" autocomplete="current-password" required></label>
        <button class="primary" type="submit">Entrar</button>
      </form>

      <form id="registerForm" class="auth-form" data-panel="register" hidden>
        <label>Seu nome<input id="registerName" type="text" autocomplete="name" required></label>
        <label>Email<input id="registerEmail" type="email" autocomplete="email" required></label>
        <label>Senha<input id="registerPassword" type="password" autocomplete="new-password" minlength="4" required></label>
        <button class="primary" type="submit">Criar conta</button>
      </form>

      <p id="authMessage" class="message"></p>
    </section>

    <section id="homeScreen" class="screen" hidden>
      <header class="home-header card">
        <div>
          <p class="eyebrow">Jogador</p>
          <h2 id="welcomeName">Minha área</h2>
        </div>
        <button id="logoutBtn" class="ghost" type="button">Sair</button>
      </header>

      <section class="card">
        <h3>Meu time</h3>
        <div id="teamBox" class="team-box"></div>
      </section>

      <section class="card">
        <h3>Meus cartões</h3>
        <div id="myCards" class="stats-row"></div>
      </section>

      <section class="card">
        <div class="section-head">
          <h3>Companheiros</h3>
          <button id="refreshHomeBtn" class="ghost" type="button">Atualizar</button>
        </div>
        <div id="teammatesList" class="teammates-list"></div>
      </section>

      <section id="linkPendingBox" class="card warn" hidden>
        <h3>Aguardando vínculo</h3>
        <p id="linkPendingText"></p>
      </section>
    </section>
  </main>

  <script src="player.js" defer></script>
</body>
</html>
