<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<meta name="theme-color" content="#000000">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Login / Cadastro | Resenha FC</title>
<link rel="manifest" href="/manifest.webmanifest">
<link rel="icon" href="/icons/icon-192.svg" type="image/svg+xml">
<link rel="stylesheet" href="/player.css?v=6">
</head>
<body>
<div class="app">
  <section id="authScreen">
    <div id="playerLoginView" class="auth-view">
      <div class="auth">
        <div class="logo">⚽ Resenha FC</div>
        <p class="auth-subtitle">Entre para acompanhar seu time e seus números.</p>

        <form id="loginForm" class="auth-form">
          <div class="input-group">
            <label>Email</label>
            <input id="loginEmail" type="email" placeholder="seu@email.com" autocomplete="email" required />
          </div>

          <div class="input-group">
            <label>Senha</label>
            <div class="password-field">
              <input id="loginPassword" type="password" placeholder="••••••••" autocomplete="current-password" required />
              <button type="button" class="pass-toggle" data-pass-toggle="loginPassword" aria-label="Mostrar senha">Mostrar</button>
            </div>
          </div>

          <button id="loginSubmitBtn" type="submit">Entrar</button>
        </form>

        <div class="link">
          Nao tem conta? <a href="#" id="goToRegisterLink">Criar conta</a>
        </div>
      </div>
    </div>

    <div id="playerRegisterView" class="auth-view" hidden>
      <div class="auth">
        <div class="logo">⚽ Criar Conta</div>
        <p class="auth-subtitle">Cadastro rápido para entrar na resenha.</p>

        <form id="registerForm" class="auth-form">
          <div class="input-group">
            <label>Nome</label>
            <input id="registerName" type="text" placeholder="Seu nome" autocomplete="name" required />
          </div>

          <div class="input-group">
            <label>Email</label>
            <input id="registerEmail" type="email" placeholder="seu@email.com" autocomplete="email" required />
          </div>

          <div class="input-group">
            <label>Senha</label>
            <div class="password-field">
              <input id="registerPassword" type="password" placeholder="Crie uma senha" autocomplete="new-password" minlength="4" required />
              <button type="button" class="pass-toggle" data-pass-toggle="registerPassword" aria-label="Mostrar senha">Mostrar</button>
            </div>
            <small class="field-help">Use pelo menos 4 caracteres.</small>
          </div>

          <div class="input-group">
            <label>Seu time</label>
            <select id="registerTeamSelect">
              <option value="">Selecione</option>
            </select>
          </div>

          <button id="registerSubmitBtn" type="submit">Cadastrar</button>
        </form>

        <div class="link">
          Ja tem conta? <a href="#" id="goToLoginLink">Entrar</a>
        </div>
      </div>
    </div>

    <p id="authMessage" class="auth-message"></p>
  </section>
</div>

<script src="/pwa.js?v=1" defer></script>
<script src="/player.js?v=19" defer></script>
</body>
</html>
