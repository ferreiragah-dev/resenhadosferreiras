<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Resenha do Futebol - Jogador</title>
<link rel="stylesheet" href="player.css">
</head>
<body>
<div class="app">
  <section id="authScreen" class="auth-card">
    <div class="auth-title">Resenha dos Ferreira</div>
    <div class="auth-sub">Cadastro e login do jogador</div>

    <div class="auth-tabs" role="tablist" aria-label="Autenticacao">
      <button class="auth-tab is-active" data-auth-tab="login" type="button">Entrar</button>
      <button class="auth-tab" data-auth-tab="register" type="button">Cadastrar</button>
    </div>

    <form id="loginForm" class="auth-form" data-panel="login">
      <label>Email<input id="loginEmail" type="email" autocomplete="email" required></label>
      <label>Senha<input id="loginPassword" type="password" autocomplete="current-password" required></label>
      <button class="primary" type="submit">Entrar</button>
    </form>

    <form id="registerForm" class="auth-form" data-panel="register" hidden>
      <label>Seu nome<input id="registerName" type="text" autocomplete="name" required></label>
      <label>Email<input id="registerEmail" type="email" autocomplete="email" required></label>
      <label>Senha<input id="registerPassword" type="password" autocomplete="new-password" minlength="4" required></label>
      <button class="primary" type="submit">Criar conta</button>
    </form>

    <p id="authMessage" class="auth-message"></p>
  </section>

  <section id="homeScreen" hidden>
    <div id="linkPendingBox" class="pending-box" hidden>
      <strong>Aguardando vinculo no PWA</strong>
      <p id="linkPendingText"></p>
    </div>

    <div class="main-profile">
      <img id="mainAvatar" class="avatar" alt="Foto do jogador">
      <div id="mainName" class="name">Jogador</div>
      <div id="mainTeam" class="team">Sem time</div>

      <div id="mainStats" class="stats"></div>
    </div>

    <div class="team-list">
      <div class="section-row">
        <div class="section-title">Companheiros de Time</div>
        <div class="section-actions">
          <button id="refreshHomeBtn" class="ghost-btn" type="button">Atualizar</button>
          <button id="logoutBtn" class="ghost-btn" type="button">Sair</button>
        </div>
      </div>

      <div id="teammatesList"></div>
    </div>
  </section>
</div>

<script src="player.js" defer></script>
</body>
</html>
