<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Login / Cadastro | Resenha FC</title>
<link rel="stylesheet" href="/player.css?v=5">
</head>
<body>
<div class="app">
  <section id="authScreen">
    <div id="playerLoginView" class="auth-view">
      <div class="auth">
        <div class="logo">⚽ Resenha FC</div>

        <form id="loginForm" class="auth-form">
          <div class="input-group">
            <label>Email</label>
            <input id="loginEmail" type="email" placeholder="seu@email.com" autocomplete="email" required />
          </div>

          <div class="input-group">
            <label>Senha</label>
            <input id="loginPassword" type="password" placeholder="••••••••" autocomplete="current-password" required />
          </div>

          <button type="submit">Entrar</button>
        </form>

        <div class="link">
          Nao tem conta? <a href="#" id="goToRegisterLink">Criar conta</a>
        </div>
      </div>
    </div>

    <div id="playerRegisterView" class="auth-view" hidden>
      <div class="auth">
        <div class="logo">⚽ Criar Conta</div>

        <form id="registerForm" class="auth-form">
          <div class="input-group">
            <label>Nome</label>
            <input id="registerName" type="text" placeholder="Seu nome" autocomplete="name" required />
          </div>

          <div class="input-group">
            <label>Email</label>
            <input id="registerEmail" type="email" placeholder="seu@email.com" autocomplete="email" required />
          </div>

          <div class="input-group">
            <label>Senha</label>
            <input id="registerPassword" type="password" placeholder="Crie uma senha" autocomplete="new-password" minlength="4" required />
          </div>

          <div class="input-group">
            <label>Seu time</label>
            <select id="registerTeamSelect">
              <option value="">Selecione</option>
            </select>
          </div>

          <button type="submit">Cadastrar</button>
        </form>

        <div class="link">
          Ja tem conta? <a href="#" id="goToLoginLink">Entrar</a>
        </div>
      </div>
    </div>

    <p id="authMessage" class="auth-message"></p>
  </section>
</div>

<script src="/player.js?v=7" defer></script>
</body>
</html>
