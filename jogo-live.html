<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#000000">
<title>Partida Ao Vivo</title>
<link rel="manifest" href="/manifest-jogo.webmanifest">
<link rel="stylesheet" href="/jogo-live.css?v=6">
</head>
<body>

<div class="app">
  <div class="layout">
    <div class="team-column left" id="playersA"></div>

    <div class="center">
      <div class="scoreboard">
        <div class="team-name" id="teamAName">Time A</div>
        <div class="score">
          <span id="scoreA">0</span> x <span id="scoreB">0</span>
        </div>
        <div class="team-name" id="teamBName">Time B</div>
      </div>

      <div class="timer" id="timer">10:00</div>

      <div class="controls">
        <button onclick="startTimer()">Play</button>
        <button class="secondary" onclick="pauseTimer()">Pausar</button>
        <button class="secondary" onclick="resetGame()">Reset</button>
        <button class="secondary" onclick="endGame()">Encerrar</button>
      </div>

      <div class="goal-controls">
        <div>
          <button class="goal-btn" id="goalPlusA">Gol + Time A</button>
          <button class="goal-btn secondary" id="goalMinusA">Gol - Time A</button>
        </div>
        <div>
          <button class="goal-btn" id="goalPlusB">Gol + Time B</button>
          <button class="goal-btn secondary" id="goalMinusB">Gol - Time B</button>
        </div>
      </div>

      <div class="timeline-panel">
        <div class="timeline-title">Timeline da Partida</div>
        <div class="timeline-list" id="eventTimeline">
          <div class="timeline-empty">Nenhum evento registrado.</div>
        </div>
      </div>
    </div>

    <div class="team-column right" id="playersB"></div>
  </div>
</div>

<div id="playerActionModal" class="live-modal hidden" aria-hidden="true">
  <div class="live-modal-backdrop" id="playerActionBackdrop"></div>
  <div class="live-modal-card" role="dialog" aria-modal="true" aria-labelledby="playerActionTitle">
    <div class="live-modal-title" id="playerActionTitle">Acoes do jogador</div>
    <div class="live-modal-sub" id="playerActionSubtitle"></div>
    <div class="live-action-grid">
      <button class="live-action-btn" data-action-stat="A">A - Assistencia</button>
      <button class="live-action-btn" data-action-stat="GP">GP - Gol Pro</button>
      <button class="live-action-btn" data-action-stat="GC">GC - Gol Contra</button>
      <button class="live-action-btn" data-action-stat="CA">CA - Cartao Amarelo</button>
      <button class="live-action-btn" data-action-stat="CV">CV - Cartao Vermelho</button>
    </div>
    <button class="close-btn" id="closePlayerActionBtn" type="button">Fechar</button>
  </div>
</div>

<script src="/jogo-live.js?v=7" defer></script>
</body>
</html>
