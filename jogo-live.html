<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Partida Ao Vivo</title>
<link rel="stylesheet" href="/jogo-live.css?v=3">
</head>
<body>

<div class="app">
  <div class="layout">
    <div class="team-column left" id="playersA"></div>

    <div class="center">
      <div class="scoreboard">
        <div class="team-name" id="teamAName">Time A</div>
        <div class="score">
          <span id="scoreA">0</span> x <span id="scoreB">0</span>
        </div>
        <div class="team-name" id="teamBName">Time B</div>
      </div>

      <div class="timer" id="timer">10:00</div>

      <div class="controls">
        <button onclick="startTimer()">▶</button>
        <button class="secondary" onclick="pauseTimer()">⏸</button>
        <button class="secondary" onclick="resetGame()">🔄</button>
      </div>

      <div class="goal-controls">
        <div>
          <button class="goal-btn" id="goalPlusA">⚽ + Time A</button>
          <button class="goal-btn secondary" id="goalMinusA">➖ Time A</button>
        </div>
        <div>
          <button class="goal-btn" id="goalPlusB">⚽ + Time B</button>
          <button class="goal-btn secondary" id="goalMinusB">➖ Time B</button>
        </div>
      </div>
    </div>

    <div class="team-column right" id="playersB"></div>
  </div>
</div>

<div id="playerActionModal" class="live-modal hidden" aria-hidden="true">
  <div class="live-modal-backdrop" id="playerActionBackdrop"></div>
  <div class="live-modal-card" role="dialog" aria-modal="true" aria-labelledby="playerActionTitle">
    <div class="live-modal-title" id="playerActionTitle">Ações do jogador</div>
    <div class="live-modal-sub" id="playerActionSubtitle"></div>
    <div class="live-action-grid">
      <button class="live-action-btn" data-action-stat="A">A - Assistência</button>
      <button class="live-action-btn" data-action-stat="GP">GP - Gol Pró</button>
      <button class="live-action-btn" data-action-stat="GC">GC - Gol Contra</button>
      <button class="live-action-btn" data-action-stat="CA">CA - Cartão Amarelo</button>
      <button class="live-action-btn" data-action-stat="CV">CV - Cartão Vermelho</button>
    </div>
    <button class="close-btn" id="closePlayerActionBtn" type="button">Fechar</button>
  </div>
</div>

<script src="/jogo-live.js?v=3" defer></script>
</body>
</html>
