<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Usuario | Resenha FC</title>
<link rel="stylesheet" href="/player-home.css?v=15">
</head>
<body>
<div class="app">
  <div class="top-actions">
    <button id="refreshBtn" class="top-btn" type="button">Atualizar</button>
    <button id="logoutBtn" class="top-btn" type="button">Sair</button>
  </div>

  <div id="pendingBox" class="pending-box hidden">
    <strong>Aguardando vinculo no PWA</strong>
    <p id="pendingText"></p>
  </div>

  <div class="tabs">
    <div class="tab active" data-tab="perfil">Perfil</div>
    <div class="tab" data-tab="tabela">Tabela</div>
    <div class="tab" data-tab="ranking">Ranking</div>
    <div class="tab" data-tab="ao-vivo">Ao Vivo</div>
    <div class="tab" data-tab="temporada">Temporada Verão 2026</div>
    <div class="tab" data-tab="jogos">Jogos</div>
  </div>

  <div id="perfil">
    <div class="main-profile">
      <div class="avatar-wrap">
        <img id="mainAvatar" class="avatar" alt="Foto do jogador">
        <span id="mainCaptainBadge" class="captain-badge hidden">C</span>
        <span id="mainTopScorerBadge" class="topscorer-badge hidden">⚽</span>
      </div>
      <div id="mainName" class="name">Jogador</div>
      <div id="mainTeam" class="team">Sem time</div>

      <div id="mainStats" class="stats"></div>
    </div>

    <div class="team-list">
      <div class="section-title">Companheiros de Time</div>
      <div id="teammatesList"></div>
    </div>
  </div>

  <div id="tabela" class="hidden">
    <div class="table" id="standingsTable"></div>
  </div>

  <div id="ranking" class="hidden">
    <div class="section-title">Ranking de jogadores</div>
    <div id="playerRankingList" class="team-list"></div>
  </div>

  <div id="ao-vivo" class="hidden">
    <div class="section-title">Jogo ao vivo</div>
    <div id="liveGameBox" class="table"></div>
    <div class="section-title" style="margin-top:12px;">Timeline</div>
    <div id="liveTimelineBox" class="table"></div>
  </div>

  <div id="temporada" class="hidden">
    <div class="section-title">Temporada Verão 2026</div>
    <div id="upcomingGamesBox" class="table"></div>
  </div>

  <div id="jogos" class="hidden">
    <div class="section-title">Jogos recentes</div>
    <div id="recentGamesBox" class="table"></div>
  </div>
</div>

<script src="/player-home.js?v=18" defer></script>
</body>
</html>
