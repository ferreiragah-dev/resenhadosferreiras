<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Usuario | Resenha FC</title>
<link rel="stylesheet" href="/player-home.css?v=7">
</head>
<body>
<div class="app">
  <div class="top-actions">
    <button id="refreshBtn" class="top-btn" type="button">Atualizar</button>
    <button id="logoutBtn" class="top-btn" type="button">Sair</button>
  </div>

  <div id="pendingBox" class="pending-box hidden">
    <strong>Aguardando vinculo no PWA</strong>
    <p id="pendingText"></p>
  </div>

  <div class="tabs">
    <div class="tab active" data-tab="perfil">Perfil</div>
    <div class="tab" data-tab="tabela">Tabela</div>
  </div>

  <div id="perfil">
    <div class="main-profile">
      <div class="avatar-wrap">
        <img id="mainAvatar" class="avatar" alt="Foto do jogador">
        <span id="mainCaptainBadge" class="captain-badge hidden">C</span>
      </div>
      <div id="mainName" class="name">Jogador</div>
      <div id="mainTeam" class="team">Sem time</div>

      <div id="mainStats" class="stats"></div>
    </div>

    <div class="team-list">
      <div class="section-title">Companheiros de Time</div>
      <div id="teammatesList"></div>
    </div>
  </div>

  <div id="tabela" class="hidden">
    <div class="table" id="standingsTable"></div>
  </div>
</div>

<script src="/player-home.js?v=8" defer></script>
</body>
</html>
