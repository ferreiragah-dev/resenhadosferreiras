<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<meta name="theme-color" content="#000000">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Usuario | Resenha FC</title>
<link rel="manifest" href="/manifest.webmanifest">
<link rel="icon" href="/icons/icon-192.svg" type="image/svg+xml">
<link rel="stylesheet" href="/player-home.css?v=24">
</head>
<body>
<div class="app">
  <div class="top-actions">
    <button id="menuOpenBtn" class="top-btn menu-btn" type="button" aria-label="Abrir menu">☰ Menu</button>
  </div>

  <div id="sidebarOverlay" class="sidebar-overlay hidden"></div>
  <aside id="sideMenu" class="side-menu" aria-hidden="true">
    <div class="side-menu-head">
      <strong>Navegacao</strong>
      <button id="menuCloseBtn" class="top-btn" type="button" aria-label="Fechar menu">Fechar</button>
    </div>
    <div class="tabs side-tabs">
      <div class="tab active" data-tab="perfil">Perfil</div>
      <div class="tab" data-tab="tabela">Tabela</div>
      <div class="tab" data-tab="ranking">Ranking</div>
      <div class="tab" data-tab="ao-vivo">Ao Vivo</div>
      <div class="tab" data-tab="temporada">Temporada Verão 2026</div>
      <div class="tab" data-tab="jogos">Jogos</div>
    </div>
    <div class="side-menu-actions">
      <button id="logoutBtn" class="top-btn side-logout-btn" type="button">Sair</button>
    </div>
  </aside>

  <div id="pendingBox" class="pending-box hidden">
    <strong>Aguardando vinculo no PWA</strong>
    <p id="pendingText"></p>
  </div>

  <div id="perfil">
    <div class="main-profile">
      <div class="avatar-wrap">
        <img id="mainAvatar" class="avatar" alt="Foto do jogador">
        <span id="mainCaptainBadge" class="captain-badge hidden">C</span>
        <span id="mainTopScorerBadge" class="topscorer-badge hidden">⚽</span>
      </div>
      <div id="mainName" class="name">Jogador</div>
      <div id="mainTeam" class="team">Sem time</div>

      <div id="mainStats" class="stats"></div>
    </div>

    <div class="team-list">
      <div class="section-title">Companheiros de Time</div>
      <div id="teammatesList"></div>
    </div>
  </div>

  <div id="tabela" class="hidden">
    <div class="table" id="standingsTable"></div>
  </div>

  <div id="ranking" class="hidden">
    <div class="section-title">Ranking de jogadores</div>
    <div id="playerRankingList" class="team-list"></div>
  </div>

  <div id="ao-vivo" class="hidden">
    <div class="section-title">Jogo ao vivo</div>
    <div id="liveGameBox" class="table"></div>
    <div class="section-title" style="margin-top:12px;">Timeline</div>
    <div id="liveTimelineBox" class="table"></div>
  </div>

  <div id="temporada" class="hidden">
    <div class="section-title">Temporada Verão 2026</div>
    <div id="upcomingGamesBox" class="table"></div>
  </div>

  <div id="jogos" class="hidden">
    <div class="section-title">Jogos recentes</div>
    <div id="recentGamesBox" class="table"></div>
  </div>
</div>

<dialog id="teamLineupDialog" class="team-lineup-dialog">
  <div class="team-lineup-head">
    <div id="teamLineupTitle" class="team-lineup-title">Escalacao</div>
  </div>
  <div id="teamLineupList" class="team-lineup-list"></div>
  <div class="team-lineup-actions">
    <button id="closeTeamLineupBtn" class="top-btn" type="button">Fechar</button>
  </div>
</dialog>

<script src="/pwa.js?v=1" defer></script>
<script src="/player-home.js?v=29" defer></script>
</body>
</html>
